    <h2>­¤īÉ HTML - Structure</h2>
    <ul>
      <li>Defines the structure of web pages using elements like `<div>`, `<header>`, `<footer>`.</li>
      <li>Uses tags like `<h1>` to `<h6>`, `<p>`, `<img>`, `<a>`, etc.</li>
      <li>Forms: `<form>`, `<input>`, `<textarea>`, `<select>`, etc.</li>
      <li>Semantic HTML improves accessibility (e.g., `<article>`, `<section>`, `<nav>`).</li>
    </ul>
  </section>

  <section class="note-section">

    <ul>

      <li>Selectors: class (`.box`), id (`#box`), element (`div`).</li>
      <li>Flexbox/Grid for layout; media queries for responsive design.</li>
    </ul>
  </section>
